<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looping</title>
</head>
<body>

    <script type="text/javascript">


        const name = 'aung aung';
        console.log(name);

                     // 0      1       2      3
        const arrs = ['red','green','blue','white'];
        console.log(arrs);
        console.log(arrs[0]);
        console.log(arrs[1]);
        console.log(arrs[2]);
        console.log(arrs[3]);
        console.log(arrs[4]); // undefined


        // => 1. for loop
        // for(statement1;statement2;statement3){
        //         code to executed
        // }


        for(var i = 0; i < 5; i++ ){
            console.log(i); // 0 1 2 3 4
        }

        console.log('Hello Sir');
        console.log('i outside value is = ',i); // i outside value is =  5

        let j = 10;

        for(j;j <= 20;j++){
            console.log(j); // 10 to 20
        }

        console.log('j outside value is =',j); //21


        // error value = 0 / error
        // for(const p=0; p < 3;p++){
        //     console.log(p);
        // }


        for(var k = 0; k <= 10;k++){
            if(k === 5){
                // console.log("5 is my fav number.")
                // console.log(k,' is my fav number.')
                // console.log(k+' is my fav number.')
                console.log(`${k} is my fav number.`)
            }

            console.log('k value is = ',k); // 0 to 10
        }

        console.log('k outside value is = ',k); //11


        // break

        for(var p=0; p < 10; p++){

            // console.log(p); // 0 to 9
            if(p === 2){
                console.log(p + ' is my fav number');
                break; // operation end
            }

            console.log(p); // 0 to 9

        }

        console.log('p outside value is = ',p); //2


        // continue

        for(var q = 0; q < 10; q++){

            // console.log(q); // 0 to 9
            if(q === 2){
                console.log(q + ' is my fav number');
                continue;
            }

            console.log(q); // 0 to 9

        }

        console.log('p outside value is = ',q); //2


        for(var s = 10; s > 0; s--){
            console.log(s); // 10 to 1
        }

        console.log('s outside value is = ',s); // 0


        // Exercise

        let myarrs = ['red','green','blue','pink','steelblue'];
        // console.log(myarrs[3]); // pink
        // console.log(myarrs[4]); // steelblue


        for(var w = 0; w < myarrs.length;w++){
            // console.log(w);
            console.log(myarrs[w]);
        }


        const peoples = [
            {name:'Aung Aung',age:25},
            {name:'Hsu Hsu',age:28},
            {name:'Kyaw Kyaw',age:22},
        ];

        // console.log(peoples[1].name); // Hsu Hsu

        for(var q=0; q < peoples.length; q++){
            // console.log(q); // 0 to 2
            console.log("Name = " + peoples[q].name + " , Age = " + peoples[q].age);
            console.log(`Name =  ${peoples[q].name} , Age =  ${peoples[q].age}`);
        }

        // => 2. For In Loop (obj/array)
        // for(key/index in obj/array){
            // code to be executed
        // }


        let students = {
            name:'Aung Aung',
            city:'Yangon',
            parent:'U Ba',
            phone:'0123456789'
        };

        console.log(students);
        console.log(students.name); // Aung Aung
        console.log(students['city']); // Yangon


        for(var key in students){
            // console.log(key);
            // console.log(students.key); // undefined

            console.log(students[key]); // bracket notation
        }



        const ourteams = ['Kyaw Kyaw','aung aung','zaw zaw'];
        // console.log(ourteams);

        for(let idx in ourteams){
            // console.log(idx); // 0 to 3 (string)
            console.log(ourteams[idx]);
        }


        const greeting = 'Hello';
        console.log(greeting[0]);

        for(var idx in greeting){
            // console.log(idx); // 0 to 4
            console.log(greeting[idx]);
        }



        //  => 3. For Of Loop (array)

        // for(value of array){
        //     code to be executed
        // }

        const girls = ['su su','lu lu','yu yu','nu nu'];

        for(var girl of girls){
            console.log(girl);
        }

        const thanks = 'hifi';

        for(let val of thanks){
            console.log(val);
        }

        // => 4. While Loop

        // start

        // while(end){
        //     before print out
        //         code to be executed
        //     after print out
        // }


        var b = 0;
        while(b < 10){
            console.log('Number b value is = ',b); // 0 to 9
            b++;
        }

        console.log('b outside value is = ',b); // 10

        let c = 0;
        while(c < 10){
            c++
            console.log('Number c value is = ',c); // 1 to 10
        }

        console.log('c outside value is = ',c); // 10



        const paints = ['red','green','blue','white','black'];

        let num = 0;

        while(num < paints.length){
            // console.log(num); // 0 to 4

            console.log('My paints color is = ',paints[num]);
            num++;
        }


        const laptop = [
            {
                cpu:'core i9',
                ram:'16Gb',
                hdd:'1Tb'
            }
        ]

        // console.log(laptop);
        console.log(laptop[0].cpu); // core i9

        let idxnum = 0;
                // 0  <  1
        while(idxnum < laptop.length){

            // console.log(idxnum); // 0
            console.log(`CPU is = ${laptop[idxnum].cpu} , RAM is = ${laptop[idxnum].ram} , HHD is = ${laptop[idxnum].hhd}`)
            idxnum++;
        }



        // => 5. Do While Loop

        // start

        // do{
        //     before print out
        //         code to be executed
        //     after print out
        // }while(end);

        let n = 0;

        do{
            console.log('N value is = ', n); // 0 to 9
            n++;

        }while(n < 10);

        console.log('Outside N value is = ', n); // 10

        let g = 0;

        do{
            g++;
            console.log('G value is = ', g); // 1 to 10

        }while(g < 10);

        console.log('Outside G value is = ', g); // 10



        const colors = ['red','green','blue','white','black'];

        // console.log(colors);

        let init = 0;

        do{
            // console.log(init); // 0 to 4
            console.log('My fav color is ',colors[init]);
            init++;

        }while(init < colors.length);


        // => 6. forEach Loop

        // mainarrays.forEach(function(value,index,array{
        //     // code to executed
        // });


        const candycolors = ['red','green','blue','white','black'];

        candycolors.forEach(function(candycolor,idx,arr){
            // console.log(candycolor);
            // console.log(idx);
            // console.log(arr);

            console.log(`Index number is = ${idx} , Value is = ${candycolor}`);
        })


        // => 7. map Loop

        // mainarrays.map(function(value,index,array{
        //     // code to executed
        // });


        const visitors = ['sai sai','aung aung','mg mg','hsu hsu','yu yu','nu nu'];

        const doctors = visitors.forEach(function(visitor){
            // console.log(visitor);
            // console.log('forEach Result = ' + visitor)

            return `Dr.${visitor}`; // array
        });

        console.log(doctors); // undefined

        const peoplearrs = visitors.map(function(visitor){
            // console.log(visitor);
            // console.log('map result = ' + visitor)

            return `Dr.${visitor}`;
        });

        console.log(visitors);
        console.log(peoplearrs);


        // => 8.filter loop

        // mainarrays.map(function(value,index,array{
        //     // code to executed
        // });

        const ages = [23,34,56,80,13,12,18,17,10,19,60,25,21,30,14];
        console.log(ages); // 15 length

        const getover18 = ages.filter(function(age){
            // console.log(age);

            return age > 18;
        });

        console.log(getover18); // (9) [23, 34, 56, 80, 19, 60, 25, 21, 30]


        const getover20 = ages.filter(function(age){

            return age >= 20;
        })

        console.log(getover20); // (8) [23, 34, 56, 80, 60, 25, 21, 30]



    </script>

</body>
</html>
