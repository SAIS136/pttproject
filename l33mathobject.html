<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Object</title>
</head>
<body>


    <script type="text/javascript">

        let val;

        val = 2.8; //2.8
        val = 2.4; //2.4

        val = Math.round(2.5); // 3
        val = Math.round(2.1); // 2
        val = Math.round(2.0); // 2

        val = Math.ceil(2.6); //3
        val = Math.ceil(2.4); //3
        val = Math.ceil(2.1); //3
        val = Math.ceil(2.0); //2
        val = Math.ceil(2.01); //3

        val = Math.floor(2.9); //2
        val = Math.floor(2.4); //2
        val = Math.floor(2.1); //2
        val = Math.floor(2.0); //2


        // square root
        val = Math.sqrt(49); //7

        // pow(base,power)
        val = Math.pow(4,3); //64

        // absolute value
        val = Math.abs(100); //100
        val = Math.abs(100.52); //100.52
        val = Math.abs(-100); //100
        val = Math.abs(-100.52); //100.52



        // minimum number
        val = Math.min(8,2,5,9,1,7,3,0,-2,-9); //-9

        // maximum number
        val = Math.max(8,2,5,9,1,7,3,0,-2,-9); //9

        // Random
        val = Math.floor(Math.random() * 10000);


        console.log(val);


    </script>

</body>
</html>
