<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Type</title>
</head>
<body>

    <script type="text/javascript">

        // String
        const name = 'Hsu Hsu';
        console.log(name);
        console.log(typeof name);
        console.warn(typeof name);
        console.error(typeof(name));

        // Number

        const age = 25;
        console.log(age);
        console.log(typeof age);

        //Boolean(true/false)
        const hascar = false;
        console.log(hascar);
        console.log(typeof hascar);

        //Object
        const date = new Date();
        console.log(date);
        console.log(typeof date);

        //Object (Javascript Object)
        //key:value

        // const address = {
        //     key:"value",
        //     key:"value",
        //     key:"value",
        //     key:"value",
        // };

        const address = {
            no:"No.123",
            street:"st btw 75x76",
            city:"Mandalay",
            country:"Myanmar"
        };


        console.log(address);
        console.log(typeof address);

        console.log(address.no); //No.123
        console.log(address.city); //Mandalay
        console.log(typeof address.city); //string


        // Array

        const hobbies = ["movie","music","sport","reading"] ; //length 4  index 0 to 3

        console.log(hobbies);
        console.log(typeof hobbies); // object
        console.log(hobbies[0]); //movie
        console.log(hobbies[2]); //sport
        console.log(typeof hobbies[2]); //string


        let fullname;
        console.log(fullname); //undefined
        console.log(typeof fullname); //undefined

        // fullname = "aung aung"
        // console.log(fullname);

        // fullname = {
        //     firstname:"aung",
        //     lastname:"zaw"
        // };

        // console.log(fullname)

        // let info;
        // console.log(info); //undefined
        // console.log(typeof info); //undefined

        let nickname = ""; //empty
        console.log(nickname);
        console.log(typeof nickname); //string

        let car = null;
        console.log(car); //null
        console.log(typeof car); //object






    </script>

</body>
</html>
