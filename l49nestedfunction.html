<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested Function</title>

        <style type="text/css">

        </style>

</head>
<body>


    <script type="text/javascript">


        function outerfun(){

            function innerfun(){
                console.log('Hello i am innerfun');
            }

            innerfun();

        }

        outerfun();


        function greet(){

            return function(){
                return 'Hello Sir'
            }
        }

        let getgreet = greet();
        let message = getgreet();
        console.log(message);

        console.log(greet()());





    </script>


</body>
</html>
