<!DOCTYPE html>
<html>
    <head>
        <title>Register Form</title>
        <link rel="icon" href="./img/icon/icon2.png" type="image/png" sizes="64x64">
        <link rel="stylesheet" href="./css/l28registerform.css" type="text/css">
    </head>
    <body>
        
        <div class="container">

            <h2>Register with us</h2>

            <form class="form" action="" method="">

                <div class="form-group">
                    <label for="username">User Name</label>
                    <input type="text" name="username" id="username" class="form-control" placeholder="Enter User Name" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" class="form-control" placeholder="Enter Email" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Enter Password" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="cfmpassword">Confirm Password</label>
                    <input type="password" name="cfmpassword" id="cfmpassword" class="form-control" placeholder="Enter Confirm Password" autocomplete="off">
                </div>

               <button type="button" class="btn">Submit</button>

            </form>
            
        </div>

    </body>
</html>
