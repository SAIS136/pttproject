<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function Exercise</title>

        <style type="text/css">

            *{
                box-sizing: border-box;
            }

            body{
                height: 100vh;

                display: flex;
                justify-content: center;
                align-items: center;
            }

            .container{
                width: 300px;
                background: #f4f4f4;
                padding: 10px;
                box-shadow: 2px 2px 5px rgba(0,0,0,.3);
            }

            label{
                display: block;
                margin: 10px 0;
            }

            .form-control{
                width: 100%;
                padding: 5px;
            }

            .btn{
                width: 100%;
                background: darkblue;
                color: #ffff;
                font-size: 16px;
                border: none;

                padding: 5px;
                margin-top: 10px;
            }

        </style>

</head>
<body>



    <div class="container">
        <h3>Show Name = <span id="replacename"></span></h3>

            <form action="" method="">

                <div class="form-group">
                    <label for="firstname">Firstname</label>
                    <input type="text" name="firstname" id="firstname" class="form-control" autocomplete="off" autofocus>
                </div>

                <div class="form-group">
                    <label for="lastname">lastname</label>
                    <input type="text" name="lastname" id="lastname" class="form-control" autocomplete="off">
                </div>

                <button type="button" class="btn" onclick="getdata()">Get Name</button>

            </form>

    </div>

    <script type="text/javascript">

        function getdata(){
            // console.log('hello');

            const getfirstname = document.getElementById("firstname").value;
            const getlastname = document.getElementById("lastname").value;
            const getreplacename = document.getElementById("replacename");

            // console.log(getfirstname);
            // console.log(getlastname);

            // getreplacename.innerText = `${getfirstname} ${getlastname}`;
            // getreplacename.textContent = `${getfirstname} ${getlastname}`;
            getreplacename.innerHTML = `${getfirstname} ${getlastname}`;

            document.getElementById("firstname").value = "";
            document.getElementById("lastname").value = "";


            document.getElementById("firstname").focus();






        }



    </script>








</body>
</html>
