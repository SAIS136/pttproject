<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow Function</title>
</head>
<body>

    <script type="text/javascript">


        // (A) Default Function | System Function
        // (B) User Define Function

                    // (1) Regular Function
                    //     (i) Manual Function
                    //     (ii) Parameter Function
                    //             (a) Single Parameter Function
                    //             (b) Multi Parameter Function


                    // (2) Arrow Function
                    //     (i) Manual Function
                    //     (ii) Parameter Function
                    //             (a) Single Parameter Function
                    //             (b) Multi Parameter Function

                    // (3) Generator Function

        // function name(){
        //     code to be executes (i) print or (ii) return
        // }

        // name(); function invoke / function recall



        // (1) Regular Function

        const regfun1 = function(){
            const num1 = 100;
            return num1;
        }

        console.log('This is regfun1 = ' + regfun1()); // 100



        // (i) Arrow Function ( ESCM 6)

        const arrfun1 = ()=>{
            const num1 = 200;
            return num1;
        }

        console.log('This is arrfun1 = ' + arrfun1()); // 200



        //  (ii) Parameter Function
            // (a) Single Parameter Function


        const arrfun2 = (num1)=>{
            return num1;
        }

        console.log('This is arrfun2 = ' + arrfun2(20));


        const arrfun3 = num1=>{
            return num1;
        }

        console.log('This is arrfun3 = ' + arrfun3(30));

        const arrfun4 = num1=>num1 + 50;

        console.log('This is arrfun4 = ' + arrfun4(40));



        //  (ii) Parameter Function
            // (b) Multi Parameter Function


        const multiarrfun1 = (num1,num2)=>{
            const result = num1+num2;
            return result;
        }

        console.log('This is multiarrfun1 = ', multiarrfun1()); // This is multiarrfun1 =  NaN
        console.log('This is multiarrfun1 = ', multiarrfun1(10)); // This is multiarrfun1 =  NaN
        console.log('This is multiarrfun1 = ', multiarrfun1(10,20)); // This is multiarrfun1 =  30
        console.log('This is multiarrfun1 = ', multiarrfun1(10,20,30)); // This is multiarrfun1 =  30


         const multiarrfun2 = (num1=100,num2=200)=>{
            const result = num1+num2;
            return result;
        }

        console.log('This is multiarrfun2 = ', multiarrfun2()); // This is multiarrfun2 =  300
        console.log('This is multiarrfun2 = ', multiarrfun2(10)); // This is multiarrfun2 =  210
        console.log('This is multiarrfun2 = ', multiarrfun2(10,20)); // This is multiarrfun2 =  30
        console.log('This is multiarrfun2 = ', multiarrfun2(10,20,30)); // This is multiarrfun2 =  30


         const multiarrfun3= (num1=100,num2=200)=>num1+num2;

          console.log('This is multiarrfun3 = ', multiarrfun3(80,20)); // This is multiarrfun3 =  100





    </script>

</body>
</html>
