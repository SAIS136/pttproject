<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arithmetic Operator</title>
</head>
<body>


    <script type="text/javascript">

        // Group Variables Declaration (,)

        var num1 = 10;
        var num2 = 20;
        var num3 = 30;
        console.log(num1,num2,num3);


        var num4,num5,num6;

        num4 = 40;
        num5 = 50;
        num6 = 60;
        console.log(num4,num5,num6);


        var num7 = 70,
            num8 = 80,
            num9 = 90;

        console.log(num7,num8,num9);


        var num10=num11=num12=100;
        console.log(num10,num11,num12);

        let val1,val2,val3;
        val1 = 10;
        val2 = 20;
        val3 = 30;
        console.log(val1,val2,val3);

        let val4 =70, val5 =80, val6 =90;
        console.log(val4,val5,val6);


        let val7=val8=val9=100;
        console.log(val7,val8,val9);

        // const x,y,z;
        // console.log(x,y,z); //error


        const val10=100, val11 =110, val12 =120;
        console.log(val10,val11,val12);

        const val13=val14=val15=200;
        console.log(val13,val14,val15);

        let x = 10,
            y = 20,
            z = 30;

        // z = 3000;

        console.log(x,y,z);

        document.write('Adding Result = ' + (x + y) + '<br/>');
        document.write('Subtraction Result = ' + (z - y) + '<br/>');
        document.write('Subtraction Result = ' + (x - y) + '<br/>');
        document.write('Multiplication Result = ' + (z * y) + '<br/>');
        document.write('Power Result = ' + (2 ** 3) + '<br/>');
        document.write('Division Result = ' + (z / y) + '<br/>');
        document.write('Modulus Result = ' + (z % y) + '<br/>');


        // Increment After

        let p = 10;
        document.write('Increment Result After Printout = ' + (p++) + '<br/>'); //10
        document.write('Increment Result After Printout = ' + (p++) + '<br/>'); //11
        document.write('Increment Result After Printout = ' + (p) + '<br/>'); //12
        document.write('Increment Result After Printout = ' + (p) + '<br/>'); //12
        document.write('Increment Result After Printout = ' + (p++) + '<br/>'); //12
        document.write('Increment Result After Printout = ' + (p) + '<br/>'); //13
        document.write('Increment Result After Printout = ' + (p) + '<br/>'); //13


        // Increment Before

        let q = 10;
        document.write('Increment Result Before Printout = ' + (++q) + '<br/>'); //11
        document.write('Increment Result Before Printout = ' + (++q) + '<br/>'); //12
        document.write('Increment Result Before Printout = ' + (q) + '<br/>'); //12
        document.write('Increment Result Before Printout = ' + (q) + '<br/>'); //12
        document.write('Increment Result Before Printout = ' + (++q) + '<br/>'); //13
        document.write('Increment Result Before Printout = ' + (q) + '<br/>'); //13
        document.write('Increment Result Before Printout = ' + (q) + '<br/>'); //13

         // Decrement After

        let r = 10;
        document.write('Decrement Result After Printout = ' + (r--) + '<br/>'); //10
        document.write('Decrement Result After Printout = ' + (r--) + '<br/>'); //9
        document.write('Decrement Result After Printout = ' + (r) + '<br/>'); //8
        document.write('Decrement Result After Printout = ' + (r) + '<br/>'); //8
        document.write('Decrement Result After Printout = ' + (r--) + '<br/>'); //8
        document.write('Decrement Result After Printout = ' + (r) + '<br/>'); //7
        document.write('Decrement Result After Printout = ' + (r) + '<br/>'); //7




        // Decrement Before

        let s = 10;
        document.write('Decrement Result Before Printout = ' + (--s) + '<br/>'); //9
        document.write('Decrement Result Before Printout = ' + (--s) + '<br/>'); //8
        document.write('Decrement Result Before Printout = ' + (s) + '<br/>'); //8
        document.write('Decrement Result Before Printout = ' + (s) + '<br/>'); //8
        document.write('Decrement Result Before Printout = ' + (--s) + '<br/>'); //7
        document.write('Decrement Result Before Printout = ' + (s) + '<br/>'); //7
        document.write('Decrement Result Before Printout = ' + (s) + '<br/>'); //7



    </script>

</body>
</html>


<!--
 Arithmetic Operators
 + adding
 - subtraction
 * multiplication
 ** power
 / division
 % reminder (modulus)

 ++ increment (before/after)
 -- decrement (before/after)
  -->
