<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Js Intro</title>
</head>
<body>

    <p>hi</p>


    <script type="text/javascript">

        console.log("Aung Aung");
        console.log('kyaw kyaw');
        console.log(`su su`);

        console.log(500);
        console.log("600");
        console.log('700');
        console.log(`800`);

        console.log(true);
        console.log(false);

        console.log("zaw zaw","tun tun","maung maung");
        console.log(100,300,400,500);
        console.log('yu yu',500,true);

        console.log(10+10); //20
        console.log(10+'40'); //1040
        console.log('20'+"50"); //2050
        console.log("aung aung"+10); //aung aung10

        console.log(true+true); //2
        console.log(true+false); //1
        console.log('true'+true); //truetrue

        console.log(true+50); //51
        console.log(false+50); //50
        console.log("true"+20); //true20
        console.log('true'+'aung aung'); //trueaung aung
        console.log('zaw zaw'+false); //zaw zawfalse


        // window.alert('Hello Myanmar');
        // window.alert('Save Myanmar');
        // alert("Are you ready to learn JS");


        // => Variable ( var / const / let )
        // var/const/let variablename = value;

        let fullname = "Myo Kyaw";

        console.log('Nyo Nyo');
        console.log('Nyo Nyo');
        console.log('Nyo Nyo');

        console.log('fullname'); // fullname
        console.log("fullname"); // fullname
        console.log(`fullname`); // fullname

        console.log(fullname); //Myo Kyaw
        console.log(fullname); //Myo Kyaw

        // window.alert(fullname);

        console.log("My friend name is fullname"); // My friend name is fullname
        console.log('My friend name is fullname'); // My friend name is fullname
        console.log(`My friend name is fullname`); // My friend name is fullname

        // => Concatenate ( + )
        console.log("My friend name is " + fullname); // My friend name is Myo Kyaw
        console.log('My friend name is' + " " + fullname); // My friend name is Myo Kyaw
        console.log(`My friend name is `+ fullname); // My friend name is Myo Kyaw

        // => Backticks ( ` ` )

        let lady = "Honey Nway Oo";

        console.log("We love lady"); // We love lady
        console.log(`${lady}`); // Honey Nway Oo
        console.log(`We love ${lady}`);

        var num1 = 100;
        const num2 = 200;

        console.log(num1);
        console.log(num2);
        console.log(num1,num2);
        console.log(num1+num2); //300

        console.log('num1'+'num2'); //num1num2
        console.log("num1+num2"); //num1+num2
        console.log('num1+num2'); //num1+num2
        console.log(`num1+num2`); //num1+num2

        console.log(`${num1}+${num2}`); //100+200
        console.log(`${num1}`+`${num2}`); //100200
        console.log(`${num1 + num2}`); //300
        console.log(typeof `${num1 + num2}`); //string

        //=> Overwrite / Override

        var num3 = 30;
        var num4 = 40;

        console.log('num3 value is = ' + num3); //num3 value is 30
        console.log('num4 value is = ' + num4); //num4 value is 40
        console.log(num3+num4); //70

        num3 = 50; //Overwrite no need to write var/const/let
        console.log('num3 value is = ' + num3); //num3 value is 50
        console.log(num3+num4); //90

        let num5 = 50;
        console.log(num5); //50

        num5 = 500;
        console.log(num5); //500

        num5 = 5000;
        console.log(num5); //5000


        const num6 = 60;
        console.log(num6); //60

        // num6 = 600;
        // console.log(num6); // Uncaught TypeError: Assignment to constant variable.


        // => Special Escape Characters (\)

        console.log("Hey i am working. do you see"); // Hey i am working. do you see
        console.log("Hey i am 'working' . do you see"); //Hey i am 'working' . do you see
        console.log('Hey i am "working". don you see'); //Hey i am "working". don you see

        // console.log('Hey i am 'working'. do you see'); //error
        // console.log("Hey i am "working". do you see"); //error

        console.log("Hay i am 'working'. do you see"); //Hay i am 'working'. do you see
        console.log('He is very tall, about 6ft 4"'); // He is very tall, about 6ft 4"


        let x = 'He\'s U Ba.';
        let y = 'He\'s my \"uncle\"';

        console.log(x+y); //He's U Ba.He's my "uncle"
        console.log(`${x}${y}`); //He's U Ba.He's my "uncle"




    </script>


</body>
</html>
