<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template String</title>
</head>
<body>

    <p>hi</p>

    <script type="text/javascript">

        var fullname;
        console.log(fullname); //undefined

        var nickname; //oki
        nickname = "tun tun";
        console.log(nickname); //tun tun

        let familyname;
        console.log(familyname); //undefined

        let aliasname;
        aliasname = "nu nu"
        console.log(aliasname); //nu nu

        // const lastname; // error
        // console.log(lastname);


        const name = "Honey Nway Oo";
        const age = 23;
        const job = "Model";
        const city = "Yangon";

        document.write(name);
        document.write(age);
        document.write(job);
        document.write(city);


        let myheading;
        console.log(myheading);

        myheading = "<h1>Hello World</h1>";
        myheading = "<h1>Hello Global</h1>";
        myheading = "<h1>Hello Human</h1>";

        console.log(myheading); //<h1>Hello Human</h1>
        document.write(myheading);


        //Without Template String

        let myliststyle;

        myliststyle = "<ul>"+
            "<li>Name : "+name+"</li>"+
            "<li>Age : "+age+"</li>"+
            "<li>Job : "+job+"</li>"+
            "<li>City : "+city+"</li>"+
            "</ul>";

        document.write(myliststyle)

        // With Template String (``)

        myliststyle = `<ul>
            <li>Name : ${name}</li>
            <li>Age : ${age}</li>
            <li>Job : ${job}</li>
            <li>City : ${city}</li>
            </ul>`;

        document.write(myliststyle);









    </script>





</body>
</html>
