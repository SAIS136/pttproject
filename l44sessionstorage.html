<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Storage</title>
</head>
<body>

    <script type="text/javascript">

        // Session Storage

        // => Create

            sessionStorage.setItem('name','aung aung');
            sessionStorage.setItem('age',27);
            sessionStorage.setItem('city','Yangon')

        // => Update (edit)

            // Method 1
            sessionStorage.setItem('name','kyaw kyaw');

            // Method 2
            sessionStorage.city = 'Mandalay';


        // => Read

            // Method 1

            const getname = sessionStorage.name;
            const getage = sessionStorage.age;
            const getcity = sessionStorage.city;

            console.log(getname,getage,getcity);
            console.log(typeof getname,typeof getage,typeof getcity);

            // Method 2

            const name = sessionStorage.getItem('name');
            const age = sessionStorage.getItem('age');
            const city = sessionStorage.getItem('city');

            console.log(name,age,city);


            // => Delete

                // Method 1 ( Single Delete )

                    // sessionStorage.removeItem('name');
                    // sessionStorage.removeItem('age');
                    // sessionStorage.removeItem('city');

                    // console.log(name,age,city); // kyaw kyaw 27 Mandalay
                    // console.log(sessionStorage.removeItem('name'),sessionStorage.removeItem('age'),sessionStorage.removeItem('city')); // undefined undefined undefined


                // Method 2 ( All Delete )

                sessionStorage.clear();






    </script>

</body>
</html>
